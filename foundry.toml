[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"

# CakeToken.sol uses pragma solidity 0.6.12; tests use 0.8.x with forge-std.
# auto_detect_solc lets Foundry pick the right compiler per file.
auto_detect_solc = true

# Mirror the EVM target that BSC used at the time CakeToken was deployed.
evm_version = "istanbul"

# IMPORTANT: never run `forge fmt` on src/CakeToken.sol — the source must stay
# byte-identical to the verified contract on BscScan. See README.md.
fmt = { ignore = ["src/CakeToken.sol"] }

[profile.ci]
verbosity = 3
fuzz = { runs = 1000 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
